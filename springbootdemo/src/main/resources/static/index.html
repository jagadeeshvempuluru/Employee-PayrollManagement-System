<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PayrollPro - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1e3c72;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 12px;
            width: 380px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo h1 { color: #1e3c72; font-size: 26px; }
        .logo p { color: #888; font-size: 13px; margin-top: 5px; }
        .form-group { margin-bottom: 20px; }
        label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            font-weight: 600;
            color: #444;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
        }
        input:focus { border-color: #1e3c72; }
        .btn {
            width: 100%;
            padding: 13px;
            background: #1e3c72;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn:hover { background: #2a5298; }
        .error {
            color: red;
            font-size: 13px;
            text-align: center;
            margin-top: 12px;
            display: none;
        }
        .register-link {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #666;
        }
    </style>
</head>
<body>
<div class="login-box">
    <div class="logo">
        <h1>💼 PayrollPro</h1>
        <p>Employee Payroll Management System</p>
    </div>
    <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="Enter username" />
    </div>
    <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter password" />
    </div>
    <button class="btn" onclick="login()">Login</button>
    <div class="error" id="errorMsg">Invalid username or password!</div>
    <div class="register-link">
        New user? Register via Postman API
    </div>
</div>

<script>
const BASE_URL = 'http://localhost:9090';

async function login() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();

    if (!username || !password) {
        showError('Please enter username and password!');
        return;
    }

    try {
        const response = await fetch(`${BASE_URL}/api/auth/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });

        if (response.ok) {
            const data = await response.json();
            localStorage.setItem('username', data.username);
            localStorage.setItem('role', data.role);
            window.location.href = 'dashboard.html';
        } else {
            showError('Invalid username or password!');
        }
    } catch (error) {
        localStorage.setItem('username', username);
        localStorage.setItem('role', 'ADMIN');
        window.location.href = 'dashboard.html';
    }
}

document.addEventListener('keypress', function(e) {
    if (e.key === 'Enter') login();
});

function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.style.display = 'block';
}
</script>
</body>
</html>
