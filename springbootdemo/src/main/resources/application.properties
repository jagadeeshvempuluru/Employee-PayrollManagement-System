# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/payroll_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Server
server.port=9090

# JWT
jwt.secret=payroll_secret_key_must_be_32_characters_minimum_length
jwt.expiration=86400000

# Jackson Date Format
spring.jackson.time-zone=Asia/Kolkata
spring.jackson.date-format=yyyy-MM-dd

# Disable Security and Thymeleaf
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration,org.springframework.boot.autoconfigure.thymeleaf.ThymeleafAutoConfiguration

# Static Resources
spring.web.resources.static-locations=classpath:/static/
spring.mvc.static-path-pattern=/**